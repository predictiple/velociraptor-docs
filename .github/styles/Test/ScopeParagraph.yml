extends: existence
message: "%s"
description: "This is the description"
link: https://docs.microsoft.com/en-us/style-guide
ignorecase: true
nonword: true
scope:
  - paragraph
level: error
raw:
  - (?s).+$

# vale adds in the (?i)(?m)\b(?: automatically
# error parsing regexp: invalid nested repetition operator in `(?i)(?m)\b(?:(?:^.+{20}))\b`
