name: Vale linter
on:
  # push:
  #   branches:
  #     - master
  pull_request:

jobs:
  vale:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vale-cli/vale-action@v2.1.1
        with:
          fail_on_error: true
          filter_mode: nofilter
